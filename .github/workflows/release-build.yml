name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version label
        required: false
        default: manual

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: flashgate-mcp-linux-amd64
            output_path: build/flashgate-mcp-linux-amd64
          - os: windows-latest
            artifact_name: flashgate-mcp-windows-amd64
            output_path: build/flashgate-mcp-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Set build date
        id: build_date
        shell: bash
        run: echo "date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/thomasweidner/flashgate-mcp/internal/version.version=${{ inputs.version }} -X github.com/thomasweidner/flashgate-mcp/internal/version.commit=${{ github.sha }} -X github.com/thomasweidner/flashgate-mcp/internal/version.date=${{ steps.build_date.outputs.date }}" \
            -o "${{ matrix.output_path }}" \
            ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Write build summary
        shell: bash
        run: |
          echo "## Release artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: \`${{ matrix.artifact_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Path: \`${{ matrix.output_path }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build date: \`${{ steps.build_date.outputs.date }}\`" >> "$GITHUB_STEP_SUMMARY"

