name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            minimum_coverage: "71.4"
          - os: ubuntu-latest
            platform: linux
            minimum_coverage: "70.6"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        shell: pwsh
        run: ./scripts/Test-GoCoverage.ps1 -PlatformName '${{ matrix.platform }}' -MinimumCoverage ${{ matrix.minimum_coverage }}

      - name: Upload coverage report
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage-${{ matrix.platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/coverage/${{ matrix.platform }}/
          if-no-files-found: warn
          retention-days: 14

      - name: Build
        shell: bash
        run: |
          mkdir -p build

          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o build/flashgate-mcp.exe ./cmd/server
          else
            go build -o build/flashgate-mcp ./cmd/server
          fi

      - name: JSON-RPC smoke test (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: bash scripts/smoke-jsonrpc.sh

      - name: JSON-RPC smoke test (Ubuntu read-only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          MCP_READ_ONLY: "true"
        run: bash scripts/smoke-jsonrpc.sh

      - name: Negative JSON-RPC smoke test (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: bash scripts/smoke-jsonrpc-negative.sh

      - name: Startup negative smoke test (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: bash scripts/smoke-startup-negative.sh

      - name: JSON-RPC smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\scripts\smoke-jsonrpc.ps1

      - name: JSON-RPC smoke test (Windows read-only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          MCP_READ_ONLY: "true"
        run: .\scripts\smoke-jsonrpc.ps1

      - name: Negative JSON-RPC smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\scripts\smoke-jsonrpc-negative.ps1

      - name: Startup negative smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\scripts\smoke-startup-negative.ps1

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run
